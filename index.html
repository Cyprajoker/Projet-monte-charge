<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présentation du Projet</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.8rem;
        }
        p {
            line-height: 1.6;
            text-align: justify;
        }
        
        /* -- LE MASQUE CSS POUR LA VIDÉO PAYSAGE -- */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* Force le ratio vertical 9:16 pour smartphone */
            overflow: hidden; /* Coupe tout ce qui dépasse */
            border-radius: 8px;
            margin: 20px 0;
            background-color: #000;
            pointer-events: none; /* Désactive les clics pour que les gens restent sur ton site */
        }
        .video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 350%; /* Zoom massif pour faire sortir les bords inutiles de l'écran */
            height: 100%;
            transform: translate(-50%, -50%); /* Centre parfaitement l'animation */
            border: 0;
        }
        /* ------------------------------------------ */

        .button {
            display: block;
            width: 100%;
            text-align: center;
            background-color: #3498db;
            color: white;
            padding: 12px 0;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Notre Projet</h1>
        
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/uaCW1er3VdY?autoplay=1&mute=1&loop=1&playlist=uaCW1er3VdY&controls=0&modestbranding=1&rel=0&playsinline=1" 
                allow="autoplay; fullscreen" 
                allowfullscreen>
            </iframe>
        </div>

        <p>
            Bienvenue sur la page de notre projet. Cette animation vous présente les grandes lignes de notre conception.
        </p>
        <p>
            Pour en savoir plus sur les détails techniques, vous pouvez consulter notre documentation.
        </p>

        <a href="#" class="button">Voir la documentation complète</a>
    </div>

</body>
</html>
