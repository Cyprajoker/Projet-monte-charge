<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquette Monte Charge - ENSISA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES À MODIFIER SELON VOTRE POSTER --- */
        :root {
            --couleur-principale: #9AB24C; /* Vert - À modifier si besoin */
            --couleur-secondaire: #004067; /* Bleu ENSISA */
            --couleur-fond: #F4F6F7; /* Gris très clair pour le fond */
            --couleur-texte: #333333;
            --police-principale: 'Montserrat', sans-serif;
        }
        /* ----------------------------------------------- */

        body {
            font-family: var(--police-principale);
            margin: 0;
            padding: 0;
            background-color: var(--couleur-fond);
            color: var(--couleur-texte);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* En-tête */
        header {
            background-color: var(--couleur-secondaire);
            color: white;
            width: 100%;
            padding: 30px 0 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 {
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        header h2 {
            margin: 10px 0 0 0;
            font-size: 1rem;
            font-weight: 400;
            color: #BDC3C7;
        }
        .etudiants {
            font-size: 0.85rem;
            margin-top: 15px;
            font-style: italic;
        }

        /* Conteneur principal */
        .container {
            width: 90%;
            max-width: 600px;
            margin-top: -20px; /* Fait remonter le conteneur sur l'en-tête */
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px;
        }

        /* Cartes d'information */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--couleur-principale);
        }
        .card h3 {
            color: var(--couleur-principale);
            margin-top: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card p, .card li {
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .card ul {
            padding-left: 20px;
            margin-bottom: 0;
        }
        .badge {
            display: inline-block;
            background-color: var(--couleur-secondaire);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Style spécifique pour la liste de contacts */
        .contact-list {
            list-style: none;
            padding-left: 0 !important;
            margin: 15px 0 0 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .contact-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background-color: #F8F9FA;
            border-radius: 6px;
            border-left: 3px solid var(--couleur-secondaire);
        }
        .btn-contact {
            display: inline-block;
            background-color: var(--couleur-secondaire);
            color: white !important;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .btn-contact:hover {
            background-color: var(--couleur-principale);
        }

        /* Vidéo (Masque CSS pour forcer le vertical) */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* Ratio 9:16 */
            overflow: hidden;
            border-radius: 8px;
            background-color: #000;
            pointer-events: auto; /* Modifié pour permettre l'interaction si besoin */
        }
